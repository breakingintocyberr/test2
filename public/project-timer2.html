    <div class="timer">
    <h2><span id="display">0</span></h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>

    <script>
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let intervalId = null;
    const display = document.getElementById('display');
    let saved = localStorage.getItem("display");

    // Create Start button function with interval.
    function startTimer() {
        if (intervalId !== null) return;
        if (typeof(Storage) !== "undefined") {
            intervalId = setInterval(() => {
                seconds++;

                if (seconds === 60) {
                    seconds = 0;
                    minutes++;
                }
                if (minutes === 60) {
                    minutes = 0;
                    hours++;
                }
                const totalSeconds = hours * 3600 + minutes * 60 + seconds;
                localStorage.setItem("display", totalSeconds);
                updateDisplay();
            }, 1000);
        }
    }
    
    function stopTimer() {
        if (intervalId !== null) {
            clearInterval(intervalId);
            intervalId = null;
        }
    }
    </script>
