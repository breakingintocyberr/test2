<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Timers</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class = "buttons">
        <button onclick="location.href='/index.html'">Home</button>
        <button onclick="location.href='/blog'">Blog</button>
        <button onclick="location.href='/pictures.html'">Pictures</button>
        <button onclick="location.href='/experience.html'">Experience</button>
    </div>

    <div class="timer">
    <h2><span id="display">0</span> seconds</h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let intervalId = null;
        const display = document.getElementById('display');

        let saved = localStorage.getItem("display");
        if (saved) {
        let total = parseInt(saved);
        hours = Math.floor(total / 3600);
        minutes = Math.floor((total % 3600) / 60);
        seconds = total % 60;
        display.textContent = `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
}

        function startTimer() {
            if (intervalId !== null) return; // exit function early

            if (typeof(Storage) !== "undefined") {

            intervalId = setInterval(() => {
                seconds++;

            if (seconds === 60) {
            seconds = 0;
            minutes++;
        }

            if (minutes === 60) {
            minutes = 0;
            hours++;
        }
    // Update display
    display.textContent = `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    // Save total seconds silently
    const totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
    localStorage.setItem("projectTimer", totalSeconds);

}, 1000);
}
}
        function stopTimer() {
            if (intervalId !== null) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

    </script>
    </div>
</body>
